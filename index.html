<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>星期一午餐訂餐</title>
<style>
body{font-family:Arial;max-width:700px;margin:auto;background:#fafafa}
h1{margin-top:30px}
.menu{border:1px solid #ddd;border-radius:8px;padding:10px;margin:8px 0;background:white}
button{padding:10px 16px;font-size:16px;border-radius:6px;border:none;background:#2b7cff;color:white;cursor:pointer}
input[type=text]{padding:8px;font-size:16px;width:200px}
#orders{margin-top:30px;background:white;border:1px solid #ddd;border-radius:8px;padding:15px}
</style>
</head>
<body>

<h1>🍱 星期一午餐訂餐</h1>
<h3>吉利日式餐盒</h3>

<form id="orderForm">

<div class="menu">烤雞腿飯 - 110元 數量：<input type="number" name="food" data-food="烤雞腿飯" min="0" value="0" style="width:60px"></div>
<div class="menu">鯛魚特餐 - 105元 數量：<input type="number" name="food" data-food="鯛魚特餐" min="0" value="0" style="width:60px"></div>
<div class="menu">鱈魚香腸 - 105元 數量：<input type="number" name="food" data-food="鱈魚香腸" min="0" value="0" style="width:60px"></div>
<div class="menu">綜合招牌 - 100元 數量：<input type="number" name="food" data-food="綜合招牌" min="0" value="0" style="width:60px"></div>
<div class="menu">叉燒特餐 - 100元 數量：<input type="number" name="food" data-food="叉燒特餐" min="0" value="0" style="width:60px"></div>
<div class="menu">雞排香腸 - 90元 數量：<input type="number" name="food" data-food="雞排香腸" min="0" value="0" style="width:60px"></div>
<div class="menu">排骨香腸 - 90元 數量：<input type="number" name="food" data-food="排骨香腸" min="0" value="0" style="width:60px"></div>
<div class="menu">豬排特餐 - 90元 數量：<input type="number" name="food" data-food="豬排特餐" min="0" value="0" style="width:60px"></div>
<div class="menu">招牌飯 - 90元 數量：<input type="number" name="food" data-food="招牌飯" min="0" value="0" style="width:60px"></div>

<br>
姓名：<input type="text" id="name" required>
<br><br>
<button type="submit">送出 / 修改訂單</button>

</form>

<br>
<button onclick="clearOrders()" style="background:#e74c3c">🗑 管理員清空今日訂單</button>

<div id="orders">
<h3>今日訂單統計</h3>
<ul id="summary"></ul>
</div>

<script>
const prices={
"烤雞腿飯":110,
"鯛魚特餐":105,
"鱈魚香腸":105,
"綜合招牌":100,
"叉燒特餐":100,
"雞排香腸":90,
"排骨香腸":90,
"豬排特餐":90,
"招牌飯":90
}

let orders=JSON.parse(localStorage.getItem("lunch_orders")||"[]")

function render(){
let count={}
let html=""
let total=0

html+="<b>訂餐明細：</b><ul>"

orders.forEach(o=>{
let price=prices[o.food]
let sum=price*o.qty
html+=`<li>${o.name}：${o.food} × ${o.qty} (${sum}元)</li>`
count[o.food]=(count[o.food]||0)+o.qty

total+=sum
})

html+="</ul>"

html+="<b>餐點統計：</b><ul>"
for(let food in count){
let qty=count[food]
let sum=qty*prices[food]
html+=`<li>${food} × ${qty} = ${sum}元</li>`
}
html+="</ul>"

html+=`<b>總金額：${total}元</b>`

document.getElementById("summary").innerHTML=html
}

render()

function clearOrders(){
if(!confirm("確定要清空今天所有訂單嗎？")) return
orders=[]
localStorage.removeItem("lunch_orders")
render()
alert("今日訂單已清空")
}

document.getElementById("orderForm").addEventListener("submit",function(e){
e.preventDefault()

let name=document.getElementById("name").value.trim()

if(!name){
alert("請輸入姓名")
return
}

// 移除該使用者舊訂單 (可修改)
orders=orders.filter(o=>o.name!==name)

let inputs=document.querySelectorAll("input[type=number]")
let hasOrder=false

inputs.forEach(i=>{
let qty=parseInt(i.value)||0
if(qty>0){
orders.push({name,food:i.dataset.food,qty})
hasOrder=true
}
})

if(!hasOrder){
alert("請至少輸入一個餐點數量")
return
}

localStorage.setItem("lunch_orders",JSON.stringify(orders))

alert("訂單已更新！")

render()
})
</script>

</body>
</html>
